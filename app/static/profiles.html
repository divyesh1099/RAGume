<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RAGume · Profiles</title>
    <meta name="description" content="Choose or create a profile before entering RAGume.">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body data-page="profile-select">
    <div class="profiles-page">
      <header class="profiles-header">
        <a class="auth-brand" href="/">
          <span class="auth-brand-mark">RG</span>
          <span class="auth-brand-name">RAGume</span>
        </a>
        <div class="inline-row">
          <span class="identity-pill" id="auth-user-pill">Account</span>
          <button class="secondary-button" type="button" id="logout-button">Sign Out</button>
        </div>
      </header>

      <main class="profiles-main">
        <h1 class="profiles-heading">Who's working today?</h1>
        <div class="pcard-grid" id="profile-selector-grid">
          <!-- Cards rendered by JS -->
        </div>
      </main>
    </div>

    <!-- Hidden management panel (used by JS for save/delete) -->
    <div aria-hidden="true" style="display:none">
      <p id="profile-select-meta"></p>
      <form id="profile-update-form">
        <input id="profile-edit-input" type="text" maxlength="120">
        <button type="submit" id="save-profile-button">Save</button>
        <button type="button" id="delete-profile-button">Delete</button>
      </form>
    </div>

    <!-- Create profile modal -->
    <div class="pmodal" id="create-profile-modal" hidden>
      <div class="pmodal-backdrop" id="pmodal-backdrop"></div>
      <div class="pmodal-card">
        <div class="pmodal-head">
          <h2>New profile</h2>
          <button class="pmodal-close" type="button" id="pmodal-close-btn" aria-label="Close">✕</button>
        </div>
        <form class="form-stack" id="profile-form">
          <div>
            <label class="field-label" for="profile-name-input">Profile name</label>
            <input id="profile-name-input" type="text" maxlength="120"
              placeholder="e.g. Backend Engineer, AI Research">
          </div>
          <button class="primary-button" type="submit" id="create-profile-button">Create</button>
        </form>
      </div>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite"></div>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
