<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RAGume · Log In</title>
    <meta name="description" content="Log in to RAGume.">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body data-page="login">
    <div class="auth-shell">
      <main class="auth-card">
        <div class="auth-brand">
          <span class="auth-brand-mark">RG</span>
          <span class="auth-brand-name">RAGume</span>
        </div>

        <div class="auth-head">
          <h1>Log in</h1>
          <p>Sign in to your profile workspace.</p>
        </div>

        <form class="form-stack" id="login-form">
          <div>
            <label class="field-label" for="login-email">Email</label>
            <input id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <div>
            <label class="field-label" for="login-password">Password</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required>
          </div>
          <button class="primary-button auth-button" type="submit" id="login-button">Log In</button>
        </form>

        <p class="auth-links">New here? <a href="/register">Create an account</a></p>
      </main>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite"></div>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
