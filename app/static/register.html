<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RAGume · Create Account</title>
    <meta name="description" content="Create a new RAGume account.">
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>
  <body data-page="register">
    <div class="auth-shell">
      <main class="auth-card">
        <div class="auth-brand">
          <span class="auth-brand-mark">RG</span>
          <span class="auth-brand-name">RAGume</span>
        </div>

        <div class="auth-head">
          <h1>Create account</h1>
          <p>One profile. Every version of your career.</p>
        </div>

        <form class="form-stack" id="register-form">
          <div>
            <label class="field-label" for="register-name">Full name</label>
            <input id="register-name" type="text" autocomplete="name" placeholder="Your name" required>
          </div>
          <div>
            <label class="field-label" for="register-email">Email</label>
            <input id="register-email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <div>
            <label class="field-label" for="register-password">Password</label>
            <input id="register-password" type="password" autocomplete="new-password" placeholder="Choose a password" required minlength="8">
          </div>
          <button class="primary-button auth-button" type="submit" id="register-button">Create Account</button>
        </form>

        <p class="auth-links">Already have an account? <a href="/login">Log in</a></p>
      </main>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite"></div>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
